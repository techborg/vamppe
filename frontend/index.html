<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>Vamppe — Connect, Share & Discover</title>
    <meta name="description" content="Vamppe is a modern social platform to connect with people, share moments, discover trending content, and chat in real time." />
    <meta name="keywords" content="vamppe, social media, connect, share, discover, chat, posts, followers, trending" />
    <meta name="author" content="Vamppe" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#f97316" />

    <!-- Canonical -->
    <link rel="canonical" href="https://vamppe.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vamppe" />
    <meta property="og:title" content="Vamppe — Connect, Share & Discover" />
    <meta property="og:description" content="Vamppe is a modern social platform to connect with people, share moments, discover trending content, and chat in real time." />
    <meta property="og:image" content="https://vamppe.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://vamppe.com/" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@vamppe" />
    <meta name="twitter:creator" content="@vamppe" />
    <meta name="twitter:title" content="Vamppe — Connect, Share & Discover" />
    <meta name="twitter:description" content="Vamppe is a modern social platform to connect with people, share moments, discover trending content, and chat in real time." />
    <meta name="twitter:image" content="https://vamppe.com/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />

    <!-- JSON-LD: WebSite structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Vamppe",
      "url": "https://vamppe.com",
      "description": "A modern social platform to connect, share, and discover.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://vamppe.com/explore?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Vamppe",
      "url": "https://vamppe.com",
      "logo": "https://vamppe.com/favicon.svg",
      "sameAs": [
        "https://twitter.com/vamppe"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
